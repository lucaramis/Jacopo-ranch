<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tracker Vitelli" />
  <meta name="theme-color" content="#111111" />
  <title>Tracker Vitelli - Ranch Sorting</title>
  <style>
    :root {
      --bg: #101114;
      --card: #1b1d22;
      --text: #ffffff;
      --muted: #b9beca;
      --green: #18b957;
      --red: #d83b36;
      --yellow: #ffd24a;
      --blue: #2f80ed;
      --border: #30333b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
      user-select: none;
    }

    header {
      padding: 14px 0 8px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 6px;
      letter-spacing: .2px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 8px auto 12px;
      max-width: 620px;
    }

    .small-btn {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
      padding: 12px 10px;
    }

    .small-btn.on { background: var(--blue); border-color: var(--blue); }
    .small-btn.reset { background: #ff9f1c; color: #111; border-color: #ff9f1c; }

    .remaining-card {
      max-width: 620px;
      margin: 0 auto 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }

    .remaining-title {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 8px;
    }

    #remainingNumbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .pill {
      min-width: 46px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #262933;
      font-size: 26px;
      font-weight: 900;
      border: 2px solid transparent;
    }

    .pill.final {
      background: var(--yellow);
      color: #111;
      border-color: white;
      transform: scale(1.07);
    }

    #status {
      margin-top: 9px;
      font-size: 16px;
      font-weight: 800;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 620px;
      margin: 0 auto 14px;
    }

    .num-btn {
      min-height: 82px;
      border: 0;
      border-radius: 18px;
      color: white;
      font-size: 40px;
      font-weight: 950;
      box-shadow: inset 0 -5px rgba(0,0,0,.18);
    }

    .num-btn.available { background: var(--green); }
    .num-btn.used { background: var(--red); opacity: .75; text-decoration: line-through; }

    .spotter .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .spotter .num-btn {
      min-height: 104px;
      font-size: 54px;
      border-radius: 22px;
    }

    .spotter h1 { font-size: 25px; }
    .spotter .pill { min-width: 72px; font-size: 42px; padding: 10px 18px; }
    .spotter #status { font-size: 20px; }

    .hint {
      max-width: 620px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      padding-bottom: 12px;
    }

    @media (orientation: landscape) {
      .spotter .grid { grid-template-columns: repeat(5, 1fr); }
      .spotter .num-btn { min-height: 88px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tracker numeri vitelli</h1>
    <div class="sub">Tocca il numero chiamato: diventa rosso. Gli ultimi 2 rimasti si evidenziano.</div>
  </header>

  <div class="topbar">
    <button class="small-btn" id="spotterBtn">Modalità Spotter</button>
    <button class="small-btn reset" id="resetBtn">RESET</button>
  </div>

  <section class="remaining-card">
    <div class="remaining-title">Numeri rimasti</div>
    <div id="remainingNumbers"></div>
    <div id="status"></div>
  </section>

  <main class="grid" id="grid"></main>

  <div class="hint">
    Consiglio: fai usare questa schermata a una persona fuori arena. Quando restano due numeri, può dirteli subito ad alta voce.
  </div>

  <script>
    const grid = document.getElementById('grid');
    const resetBtn = document.getElementById('resetBtn');
    const spotterBtn = document.getElementById('spotterBtn');
    const remainingNumbers = document.getElementById('remainingNumbers');
    const status = document.getElementById('status');

    let used = Array(10).fill(false);
    let spotterMode = false;

    function vibrate(ms) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function saveState() {
      try {
        localStorage.setItem('ranchTrackerUsed', JSON.stringify(used));
        localStorage.setItem('ranchTrackerSpotter', JSON.stringify(spotterMode));
      } catch (e) {}
    }

    function loadState() {
      try {
        const savedUsed = JSON.parse(localStorage.getItem('ranchTrackerUsed'));
        const savedSpotter = JSON.parse(localStorage.getItem('ranchTrackerSpotter'));
        if (Array.isArray(savedUsed) && savedUsed.length === 10) used = savedUsed.map(Boolean);
        if (typeof savedSpotter === 'boolean') spotterMode = savedSpotter;
      } catch (e) {}
    }

    function getRemaining() {
      return used.map((isUsed, n) => isUsed ? null : n).filter(n => n !== null);
    }

    function renderRemaining() {
      const remaining = getRemaining();
      remainingNumbers.innerHTML = '';

      remaining.forEach(n => {
        const pill = document.createElement('div');
        pill.className = 'pill' + (remaining.length <= 2 ? ' final' : '');
        pill.textContent = n;
        remainingNumbers.appendChild(pill);
      });

      if (remaining.length === 10) {
        status.textContent = 'Tutti i numeri disponibili';
      } else if (remaining.length > 2) {
        status.textContent = remaining.length + ' numeri ancora possibili';
      } else if (remaining.length === 2) {
        status.textContent = 'ULTIMI 2: preparati su questi';
      } else if (remaining.length === 1) {
        status.textContent = 'ULTIMO NUMERO RIMASTO';
      } else {
        status.textContent = 'Tutti i numeri sono stati chiamati';
      }
    }

    function renderButtons() {
      grid.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn ' + (used[i] ? 'used' : 'available');
        btn.textContent = i;
        btn.setAttribute('aria-label', 'Numero ' + i);
        btn.addEventListener('click', () => {
          const before = getRemaining().length;
          used[i] = !used[i];
          const after = getRemaining().length;
          if (after === 2 && before !== 2) vibrate(180);
          else vibrate(35);
          saveState();
          render();
        });
        grid.appendChild(btn);
      }
    }

    function renderSpotter() {
      document.body.classList.toggle('spotter', spotterMode);
      spotterBtn.classList.toggle('on', spotterMode);
      spotterBtn.textContent = spotterMode ? 'Spotter ON' : 'Modalità Spotter';
    }

    function render() {
      renderSpotter();
      renderButtons();
      renderRemaining();
    }

    resetBtn.addEventListener('click', () => {
      used = Array(10).fill(false);
      vibrate(80);
      saveState();
      render();
    });

    spotterBtn.addEventListener('click', () => {
      spotterMode = !spotterMode;
      vibrate(45);
      saveState();
      render();
    });

    loadState();
    render();
  </script>
</body>
</html>
